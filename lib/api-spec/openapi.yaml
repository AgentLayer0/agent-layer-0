openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: waitlist
    description: Waitlist operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /waitlist/stats:
    get:
      operationId: getWaitlistStats
      tags: [waitlist]
      summary: Get waitlist stats
      description: Returns count and percentage breakdown of waitlist signups by building category
      responses:
        "200":
          description: Waitlist stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitlistStats"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    WaitlistStatItem:
      type: object
      properties:
        value:
          type: string
        label:
          type: string
        count:
          type: integer
        percentage:
          type: number
      required:
        - value
        - label
        - count
        - percentage
    WaitlistStats:
      type: object
      properties:
        total:
          type: integer
        breakdown:
          type: array
          items:
            $ref: "#/components/schemas/WaitlistStatItem"
      required:
        - total
        - breakdown
