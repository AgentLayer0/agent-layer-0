openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: waitlist
    description: Waitlist operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /waitlist:
    post:
      operationId: createWaitlistSignup
      tags: [waitlist]
      summary: Create a waitlist signup
      description: Adds an email (and optional building category) to the waitlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WaitlistSignupInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitlistSignupResponse"
        "200":
          description: Already on the waitlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitlistSignupResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /waitlist/stats:
    get:
      operationId: getWaitlistStats
      tags: [waitlist]
      summary: Get waitlist stats
      description: Returns count and percentage breakdown of waitlist signups by building category
      responses:
        "200":
          description: Waitlist stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitlistStats"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    WaitlistStatItem:
      type: object
      properties:
        value:
          type: string
        label:
          type: string
        count:
          type: integer
        percentage:
          type: number
      required:
        - value
        - label
        - count
        - percentage
    WaitlistStats:
      type: object
      properties:
        total:
          type: integer
        breakdown:
          type: array
          items:
            $ref: "#/components/schemas/WaitlistStatItem"
      required:
        - total
        - breakdown
    WaitlistSignupInput:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        buildingWith:
          type: string
          maxLength: 64
      required:
        - email
    WaitlistSignupResponse:
      type: object
      properties:
        ok:
          type: boolean
        alreadyOnList:
          type: boolean
      required:
        - ok
        - alreadyOnList
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
