kind = "web"
previewPath = "/"
title = "Agent Layer 0"
version = "1.0.0"
id = "artifacts/agent-layer-0"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18724

[services.development]
run = "pnpm --filter @workspace/agent-layer-0 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/agent-layer-0", "run", "build" ]
publicDir = "artifacts/agent-layer-0/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18724"
BASE_PATH = "/"
