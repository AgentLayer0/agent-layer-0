kind = "web"
previewPath = "/al0-ops/"
title = "AL0 Ops Console"
version = "1.0.0"
id = "artifacts/admin-console"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/al0-ops/" ]
localPort = 26208

[services.development]
run = "pnpm --filter @workspace/admin-console run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/admin-console", "run", "build" ]
publicDir = "artifacts/admin-console/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26208"
BASE_PATH = "/al0-ops/"
